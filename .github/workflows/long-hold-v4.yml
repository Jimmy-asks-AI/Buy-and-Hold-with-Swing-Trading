name: long-hold-v4

on:
  push:
    paths:
      - ".github/workflows/**"
      - "strategy_lab/long_hold_v4/**"
      - "strategy_lab/backtest_overfit_pbo.py"
      - "strategy_lab/performance_metrics.py"
      - "strategy_lab/portfolio_weighting_constraints.py"
      - "strategy_lab/paper_trading_monitor.py"
      - "strategy_lab/real_data_adapter.py"
      - "data_catalog/**"
      - "portfolio_lab/long_hold_v4/**"
      - "tests/**"
      - "configs/long_hold_v4*.json"
      - "configs/schemas/**"
      - "requirements*.txt"
      - "examples/synthetic_run/**"
      - "examples/formal_data_intake/**"
      - "README.md"
      - "LONG_HOLD_V4.md"
      - "reports/LONG_HOLD_V4*.md"
      - "notes/long_hold_v4*.md"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "strategy_lab/long_hold_v4/**"
      - "strategy_lab/backtest_overfit_pbo.py"
      - "strategy_lab/performance_metrics.py"
      - "strategy_lab/portfolio_weighting_constraints.py"
      - "strategy_lab/paper_trading_monitor.py"
      - "strategy_lab/real_data_adapter.py"
      - "data_catalog/**"
      - "portfolio_lab/long_hold_v4/**"
      - "tests/**"
      - "configs/long_hold_v4*.json"
      - "configs/schemas/**"
      - "requirements*.txt"
      - "examples/synthetic_run/**"
      - "examples/formal_data_intake/**"
      - "README.md"
      - "LONG_HOLD_V4.md"
      - "reports/LONG_HOLD_V4*.md"
      - "notes/long_hold_v4*.md"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-long-hold-v4.txt
            requirements-long-hold-v4-public-data.txt
            requirements-long-hold-v4-authorized-data.txt
            requirements-long-hold-v4-pdf.txt
            requirements-long-hold-v4-dev.txt
      - run: pip install -r requirements-long-hold-v4-dev.txt
      - run: python -m pytest -q tests
      - run: python -m unittest discover -s tests -p "test_long_hold_v4*.py" -v
      - run: python -m compileall strategy_lab tests
      - run: python -m strategy_lab.long_hold_v4.synthetic_replay
